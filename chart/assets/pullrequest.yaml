openapi: 3.0.3
info:
  version: 1.1.4
  title: GitHub v3 REST API
  description: GitHub's v3 REST API - Pull requests excerpt.
  license:
    name: MIT
    url: https://spdx.org/licenses/MIT
  termsOfService: https://docs.github.com/articles/github-terms-of-service
  contact:
    name: Support
    url: https://support.github.com/contact?tags=dotcom-rest-api
  x-github-plan: api.github.com
servers:
- url: https://api.github.com
externalDocs:
  description: GitHub v3 REST API
  url: https://docs.github.com/rest/
paths:
  "/repos/{owner}/{repo}/pulls":
    post:
      summary: Create a pull request
      description: |-
        Creates a pull request. The head and base branches are modelled as the resource fields
        `head_ref` / `base_ref` and mapped into the API's `head` / `base` body fields by the
        RestDefinition (GitHub returns `head`/`base` as OBJECTS on reads, so keeping distinct
        resource field names avoids a spec-vs-remote type clash).

        OAuth app tokens and personal access tokens (classic) need the `repo` scope to use this endpoint.
      tags:
      - pulls
      operationId: pulls/create
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/pulls/pulls#create-a-pull-request
      parameters:
      - "$ref": "#/components/parameters/owner"
      - "$ref": "#/components/parameters/repo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the new pull request.
                head:
                  type: string
                  description: The name of the branch where your changes are implemented
                    (filled by the controller from `head_ref`).
                head_ref:
                  type: string
                  description: The name of the branch where your changes are implemented
                    (resource-side field mapped to the API `head` body field).
                base:
                  type: string
                  description: The name of the branch you want the changes pulled into
                    (filled by the controller from `base_ref`).
                base_ref:
                  type: string
                  description: The name of the branch you want the changes pulled into
                    (resource-side field mapped to the API `base` body field).
                body:
                  type: string
                  description: The contents of the pull request.
                draft:
                  type: boolean
                  description: Indicates whether the pull request is a draft.
              required:
              - title
              - head_ref
              - base_ref
            examples:
              default:
                value:
                  title: 'builder: page example'
                  head_ref: builder/page-example
                  base_ref: main
                  body: Generated by the portal builder.
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/pull-request"
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: pulls
        subcategory: pulls
  "/repos/{owner}/{repo}/pulls/{pull_number}":
    get:
      summary: Get a pull request
      description: Get details of a pull request by its number (sourced from the resource status).
      tags:
      - pulls
      operationId: pulls/get
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/pulls/pulls#get-a-pull-request
      parameters:
      - "$ref": "#/components/parameters/owner"
      - "$ref": "#/components/parameters/repo"
      - "$ref": "#/components/parameters/pull-number"
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/pull-request"
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: pulls
        subcategory: pulls
    patch:
      summary: Update a pull request
      description: |-
        Updates the title, body or state of a pull request. Setting `state: closed` in the
        resource spec closes the pull request.
      tags:
      - pulls
      operationId: pulls/update
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/pulls/pulls#update-a-pull-request
      parameters:
      - "$ref": "#/components/parameters/owner"
      - "$ref": "#/components/parameters/repo"
      - "$ref": "#/components/parameters/pull-number"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the pull request.
                body:
                  type: string
                  description: The contents of the pull request.
                state:
                  type: string
                  description: State of this pull request. Either `open` or `closed`.
                  enum:
                  - open
                  - closed
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/pull-request"
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: pulls
        subcategory: pulls
components:
  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
  parameters:
    owner:
      name: owner
      description: The account owner of the repository. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    repo:
      name: repo
      description: The name of the repository without the `.git` extension. The name
        is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    pull-number:
      name: pull_number
      description: The number that identifies the pull request.
      in: path
      required: true
      schema:
        type: integer
  schemas:
    pull-request:
      title: Pull Request
      description: Pull request (trimmed - `head`/`base` objects intentionally omitted; the
        resource models them as the `head_ref`/`base_ref` spec fields)
      type: object
      properties:
        number:
          type: integer
          description: Number uniquely identifying the pull request within its repository.
          example: 42
        html_url:
          type: string
          format: uri
        state:
          type: string
          description: State of this Pull Request. Either `open` or `closed`.
          enum:
          - open
          - closed
        title:
          type: string
          description: The title of the pull request.
        body:
          type: string
        draft:
          type: boolean
          description: Indicates whether or not the pull request is a draft.
        merged:
          type: boolean
        merged_at:
          type: string
          format: date-time
      required:
      - number
      - html_url
      - state
      - title
